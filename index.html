<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FH Family EDC</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F7F6F2;--surface:#FFFFFF;--border:#E2E0D8;--border2:#C8C5BB;
  --text:#1A1917;--muted:#6B6860;--hint:#A09E98;
  --blue:#1B56A8;--blue-bg:#EBF1FB;--blue-mid:#4A7FD4;
  --teal:#0F6E56;--teal-bg:#E2F4EE;
  --amber:#8A5010;--amber-bg:#FBF0DC;
  --red:#9B2424;--red-bg:#FCEAEA;
  --green:#2A6B2A;--green-bg:#EAF4EA;
  --r:10px;--rl:14px;
}
html{font-size:14px;}
body{background:var(--bg);color:var(--text);font-family:'Georgia',serif;min-height:100vh;}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:2.5rem;width:100%;max-width:400px;}
.login-logo{font-size:11px;font-family:sans-serif;letter-spacing:.15em;color:var(--muted);margin-bottom:1.5rem;text-transform:uppercase;}
.login-title{font-size:22px;font-weight:normal;margin-bottom:6px;}
.login-sub{font-size:12px;color:var(--muted);margin-bottom:2rem;line-height:1.6;font-family:sans-serif;}
.lf{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.lf label{font-size:11px;font-family:sans-serif;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.lf input{padding:9px 12px;border:1px solid var(--border2);border-radius:var(--r);font-size:14px;font-family:sans-serif;background:var(--bg);color:var(--text);outline:none;}
.lf input:focus{border-color:var(--blue-mid);background:#fff;}
.login-btn{width:100%;padding:10px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-family:sans-serif;cursor:pointer;margin-top:6px;}
.login-btn:hover{background:#163f80;}
.login-err{font-size:12px;color:var(--red);font-family:sans-serif;margin-top:10px;display:none;}

/* APP SHELL */
#app-screen{display:none;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100;}
.topbar-logo{font-size:13px;letter-spacing:.04em;}
.topbar-logo span{color:var(--blue);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.topbar-user{font-size:12px;color:var(--muted);font-family:sans-serif;}
.tb-btn{padding:6px 12px;border:1px solid var(--border2);border-radius:var(--r);background:transparent;font-size:12px;cursor:pointer;font-family:sans-serif;color:var(--text);}
.tb-btn:hover{background:var(--bg);}
.tb-btn.primary{background:var(--blue);color:#fff;border-color:var(--blue);}
.tb-btn.primary:hover{background:#163f80;}
.tb-btn.danger{color:var(--red);border-color:var(--red);}
.tb-btn.danger:hover{background:var(--red-bg);}

/* MAIN */
.main{max-width:900px;margin:0 auto;padding:1.5rem 1rem;}
.view{display:none;}
.view.active{display:block;}

/* FAMILIES LIST */
.list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.list-title{font-size:17px;}
.empty-state{text-align:center;padding:4rem 2rem;color:var(--hint);font-family:sans-serif;font-size:13px;}

/* FAMILY ROW */
.fam-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:10px;overflow:hidden;transition:border-color .15s;}
.fam-row-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;}
.fam-row-head:hover{background:var(--bg);}
.fam-row-left{display:flex;align-items:center;gap:10px;}
.fam-code{font-size:13px;font-family:'Courier New',monospace;font-weight:700;color:var(--blue);background:var(--blue-bg);padding:3px 10px;border-radius:5px;letter-spacing:.04em;}
.fam-name{font-size:14px;}
.fam-meta{font-size:11px;color:var(--muted);font-family:sans-serif;margin-top:2px;}
.fam-right{display:flex;align-items:center;gap:8px;}
.badge{font-size:10px;padding:2px 7px;border-radius:4px;font-family:sans-serif;}
.badge-blue{background:var(--blue-bg);color:var(--blue);}
.badge-teal{background:var(--teal-bg);color:var(--teal);}
.chev{font-size:13px;color:var(--hint);transition:transform .2s;display:inline-block;}
.chev.open{transform:rotate(180deg);}

/* FAMILY BODY */
.fam-row-body{border-top:1px solid var(--border);padding:14px 16px;display:none;background:var(--bg);}
.fam-row-body.open{display:block;}
.member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px;margin-bottom:12px;}
.member-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;cursor:pointer;transition:all .15s;}
.member-card:hover{border-color:var(--blue-mid);background:var(--blue-bg);}
.mc-code{font-size:10px;font-family:'Courier New',monospace;color:var(--muted);margin-bottom:4px;}
.mc-name{font-size:12px;font-family:sans-serif;font-weight:500;color:var(--text);}
.mc-role{font-size:10px;color:var(--muted);font-family:sans-serif;margin-top:2px;}
.mc-status{width:6px;height:6px;border-radius:50%;background:var(--teal);display:inline-block;margin-right:4px;}
.add-member-card{background:transparent;border:1.5px dashed var(--border2);border-radius:var(--r);padding:10px 12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;font-size:12px;font-family:sans-serif;color:var(--teal);}
.add-member-card:hover{border-color:var(--teal);background:var(--teal-bg);}
.fam-actions{display:flex;gap:8px;padding-top:10px;border-top:1px solid var(--border);}

/* FORM */
.form-topbar{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid var(--border);position:sticky;top:52px;background:var(--bg);z-index:99;padding-top:1rem;}
.form-code{font-size:14px;font-family:'Courier New',monospace;font-weight:700;color:var(--blue);background:var(--blue-bg);padding:5px 13px;border-radius:6px;letter-spacing:.04em;}
.form-role{font-size:16px;}
.sec-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:1rem;}
.sec-body{padding:16px;}
.sec-lbl{font-size:10px;font-family:sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:14px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.sec-lbl:first-child{margin-top:0;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px;}
@media(max-width:600px){.grid2,.grid3,.grid4{grid-template-columns:1fr 1fr;}}
.fld{display:flex;flex-direction:column;gap:4px;}
.lbl{font-size:11px;font-family:sans-serif;color:var(--muted);}
input[type=text],input[type=date],input[type=number],input[type=email],select{
  padding:7px 10px;border:1px solid var(--border2);border-radius:var(--r);
  font-size:12px;font-family:sans-serif;background:var(--bg);color:var(--text);outline:none;width:100%;
}
input:focus,select:focus{border-color:var(--blue-mid);background:#fff;}
.yn{display:flex;gap:5px;}
.yn-b{flex:1;padding:6px 0;border:1px solid var(--border2);border-radius:var(--r);background:transparent;cursor:pointer;font-size:12px;font-family:sans-serif;color:var(--muted);transition:all .12s;}
.yn-b.y{background:var(--teal-bg);border-color:#5DCAA5;color:var(--teal);font-weight:500;}
.yn-b.n{background:var(--red-bg);border-color:#F09595;color:var(--red);font-weight:500;}
.meds-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px;}
@media(max-width:600px){.meds-grid{grid-template-columns:1fr 1fr;}}
.med-item{display:flex;align-items:center;gap:6px;padding:6px 8px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .12s;font-family:sans-serif;font-size:11px;color:var(--muted);}
.med-item:hover{border-color:var(--border2);}
.med-item.on{background:var(--blue-bg);border-color:var(--blue-mid);color:var(--blue);}
.med-box{width:13px;height:13px;border:1px solid var(--border2);border-radius:3px;flex-shrink:0;}
.med-item.on .med-box{background:var(--blue);border-color:var(--blue);}
.dutch-opts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.dutch-o{padding:6px 14px;border:1px solid var(--border2);border-radius:var(--r);cursor:pointer;font-size:12px;font-family:sans-serif;color:var(--muted);transition:all .12s;}
.dutch-o.sel{background:var(--amber-bg);border-color:#D4A84B;color:var(--amber);font-weight:500;}
.nyha-g{display:flex;gap:5px;}
.nyha-b{flex:1;padding:6px 0;border:1px solid var(--border2);border-radius:var(--r);background:transparent;cursor:pointer;font-size:12px;font-family:sans-serif;color:var(--muted);}
.nyha-b.sel{background:var(--amber-bg);border-color:#D4A84B;color:var(--amber);font-weight:500;}
.form-actions{display:flex;gap:10px;margin-top:1rem;padding:1rem 0;border-top:1px solid var(--border);}
.save-btn{flex:1;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-family:sans-serif;cursor:pointer;}
.save-btn:hover{background:#163f80;}
.save-btn:disabled{opacity:.5;cursor:not-allowed;}
.cancel-btn{padding:11px 20px;border:1px solid var(--border2);border-radius:var(--r);background:transparent;font-size:13px;font-family:sans-serif;cursor:pointer;color:var(--muted);}
.cancel-btn:hover{background:var(--bg);}
.save-msg{font-size:12px;font-family:sans-serif;padding:8px 12px;border-radius:var(--r);margin-top:8px;display:none;}
.save-msg.ok{background:var(--green-bg);color:var(--green);}
.save-msg.err{background:var(--red-bg);color:var(--red);}
.save-msg.warn{background:var(--amber-bg);color:var(--amber);}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid #ccc;border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px;}
@keyframes spin{to{transform:rotate(360deg);}}
.field-err{font-size:11px;color:var(--red);font-family:sans-serif;margin-top:2px;min-height:14px;display:block;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">FH · EDC · System</div>
    <div class="login-title">Είσοδος</div>
    <div class="login-sub">Διαστρωμάτωση Καρδιαγγειακού Κινδύνου &amp; Οικογενής Υπερχοληστερολαιμία</div>
    <div class="lf"><label>Email</label><input type="email" id="login-email" placeholder="user@uoi.gr"></div>
    <div class="lf"><label>Κωδικός</label><input type="password" id="login-pass" placeholder="••••••••"></div>
    <button class="login-btn" onclick="doLogin()">Σύνδεση</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-logo">FH <span>EDC</span></div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbar-user"></span>
      <button class="tb-btn" onclick="exportAllXLSX()">↓ XLSX</button>
      <button class="tb-btn" onclick="exportAllCSV()">↓ CSV</button>
      <button class="tb-btn primary" onclick="createFamily()">+ Νέα Οικογένεια</button>
      <button class="tb-btn" onclick="doLogout()">Έξοδος</button>
    </div>
  </div>

  <div class="main">

    <!-- FAMILIES VIEW -->
    <div class="view active" id="view-families">
      <div class="list-header">
        <div class="list-title">Οικογένειες</div>
        <button class="tb-btn" onclick="loadFamilies()">↻ Ανανέωση</button>
      </div>
      <div id="families-list"><div class="empty-state">Φόρτωση...</div></div>
    </div>

    <!-- FORM VIEW -->
    <div class="view" id="view-form">
      <div class="form-topbar">
        <div class="form-code" id="form-code-lbl"></div>
        <div class="form-role" id="form-role-lbl"></div>
      </div>
      <div id="form-body"></div>
      <div class="form-actions">
        <button class="cancel-btn" onclick="goBackToFamilies()">← Πίσω</button>
        <button class="save-btn" id="save-btn" onclick="saveMember()">Αποθήκευση</button>
      </div>
      <div id="save-msg" class="save-msg"></div>
    </div>

  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  CONFIG - Supabase credentials
// ══════════════════════════════════════════════
const SUPABASE_URL = 'https://xhsyiqsddnqgtjrpoerk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhoc3lpcXNkZG5xZ3RqcnBvZXJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMTgzMDgsImV4cCI6MjA4OTY5NDMwOH0.9WhEtvIBmBH9vlLrOZ5LpRTQFHsF4iyWsUgBwN4PLuw';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// ══════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;

  const errEl = document.getElementById('login-err');
  errEl.style.display = 'none';
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { errEl.textContent = 'Λάθος email ή κωδικός.'; errEl.style.display = 'block'; }
}
async function doLogout() { await sb.auth.signOut(); }

sb.auth.onAuthStateChange((event, session) => {
  if (session) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display   = 'block';
    document.getElementById('topbar-user').textContent    = session.user.email;
    if (event === 'SIGNED_IN') loadFamilies();
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display   = 'none';
  }
});

// ══════════════════════════════════════════════
//  FORM STATE PERSISTENCE
// ══════════════════════════════════════════════
const formPersistence = {
  save() {
    const state = { formState, curFamId, curFamCode, curRole, curMemId };
    sessionStorage.setItem('formState', JSON.stringify(state));
  },
  load() {
    const saved = sessionStorage.getItem('formState');
    return saved ? JSON.parse(saved) : null;
  },
  clear() {
    sessionStorage.removeItem('formState');
  }
};

let autoSaveTimer = null;
function triggerAutoSave() {
  if (autoSaveTimer) clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    formPersistence.save();
  }, 5000);
}

// ══════════════════════════════════════════════
//  VIEWS
// ══════════════════════════════════════════════
function showView(name) {
  if (document.querySelector('.view.active')?.id === 'view-form') {
    formPersistence.save();
  }
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
}

// ══════════════════════════════════════════════
//  FAMILIES
// ══════════════════════════════════════════════
let allFamilies = [];

async function loadFamilies() {
  showView('families');
  const { data, error } = await sb
    .from('families')
    .select('*, members(*)')
    .order('family_code', { ascending: true });

  allFamilies = data || [];
  renderFamilies();
}

function renderFamilies() {
  const el = document.getElementById('families-list');
  if (!allFamilies.length) {
    el.innerHTML = '<div class="empty-state">Δεν βρέθηκαν οικογένειες. Πατήστε «+ Νέα Οικογένεια».</div>';
    return;
  }
  el.innerHTML = allFamilies.map(fam => famRowHTML(fam)).join('');
}

function famRowHTML(fam) {
  const members  = fam.members || [];
  const p1       = members.find(m => m.role === 'Parent1');
  const p2       = members.find(m => m.role === 'Parent2');
  const children = members.filter(m => m.role.startsWith('Child'))
                          .sort((a,b) => a.role.localeCompare(b.role));
  const famName  = p1?.data?.name || '—';
  const date     = new Date(fam.created_at).toLocaleDateString('el-GR');
  const nextChildNum = children.length + 1;

  const cards = [
    p1
      ? '<div class="member-card" onclick="openMemberForm(\'' + fam.id + '\',\'' + fam.family_code + '\',\'Parent1\',\'' + p1.id + '\')"><div class="mc-code">' + fam.family_code + '_Parent1</div><div class="mc-name"><span class="mc-status"></span>' + (p1.data?.name||'—') + '</div><div class="mc-role">Γονέας 1</div></div>'
      : '<div class="add-member-card" onclick="openMemberForm(\'' + fam.id + '\',\'' + fam.family_code + '\',\'Parent1\',null)">+ Γονέας 1</div>',
    p2
      ? '<div class="member-card" onclick="openMemberForm(\'' + fam.id + '\',\'' + fam.family_code + '\',\'Parent2\',\'' + p2.id + '\')"><div class="mc-code">' + fam.family_code + '_Parent2</div><div class="mc-name"><span class="mc-status"></span>' + (p2.data?.name||'—') + '</div><div class="mc-role">Γονέας 2</div></div>'
      : '<div class="add-member-card" onclick="openMemberForm(\'' + fam.id + '\',\'' + fam.family_code + '\',\'Parent2\',null)">+ Γονέας 2</div>',
    ...children.map(c =>
      '<div class="member-card" onclick="openMemberForm(\'' + fam.id + '\',\'' + fam.family_code + '\',\'' + c.role + '\',\'' + c.id + '\')"><div class="mc-code">' + fam.family_code + '_' + c.role + '</div><div class="mc-name"><span class="mc-status"></span>' + (c.data?.name||'—') + '</div><div class="mc-role">' + roleLabel(c.role) + '</div></div>'
    ),
    '<div class="add-member-card" onclick="openMemberForm(\'' + fam.id + '\',\'' + fam.family_code + '\',\'Child' + nextChildNum + '\',null)">+ Παιδί ' + nextChildNum + '</div>'
  ].join('');

  return '<div class="fam-row" id="famrow_' + fam.id + '">' +
    '<div class="fam-row-head" onclick="toggleFam(\'' + fam.id + '\')">' +
      '<div class="fam-row-left">' +
        '<span class="fam-code">' + fam.family_code + '</span>' +
        '<div>' +
          '<div class="fam-name">' + famName + '</div>' +
          '<div class="fam-meta">' + date + ' · ' + members.length + ' μέλη καταχωρημένα</div>' +
        '</div>' +
      '</div>' +
      '<div class="fam-right">' +
        (p1 ? '<span class="badge badge-blue">Γ1</span>' : '') +
        (p2 ? '<span class="badge badge-blue">Γ2</span>' : '') +
        (children.length ? '<span class="badge badge-teal">' + children.length + ' παιδ' + (children.length>1?'ιά':'ί') + '</span>' : '') +
        '<span class="chev" id="chev_' + fam.id + '">▾</span>' +
      '</div>' +
    '</div>' +
    '<div class="fam-row-body" id="fambody_' + fam.id + '">' +
      '<div class="member-grid">' + cards + '</div>' +
      '<div class="fam-actions">' +
        '<button class="tb-btn" onclick="exportFamilyXLSX(\'' + fam.id + '\')">↓ XLSX</button>' +
        '<button class="tb-btn" onclick="exportFamilyCSV(\'' + fam.id + '\')">↓ CSV</button>' +
        '<button class="tb-btn danger" onclick="deleteFamily(\'' + fam.id + '\')">Διαγραφή οικογένειας</button>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function toggleFam(id) {
  const body = document.getElementById('fambody_' + id);
  const chev = document.getElementById('chev_' + id);
  const open = body.classList.toggle('open');
  if (chev) chev.classList.toggle('open', open);
}

function roleLabel(role) {
  if (role === 'Parent1') return 'Γονέας 1';
  if (role === 'Parent2') return 'Γονέας 2';
  return 'Παιδί ' + role.replace('Child','');
}

// ══════════════════════════════════════════════
//  CREATE FAMILY
// ══════════════════════════════════════════════
async function createFamily() {
  const { data } = await sb
    .from('families')
    .select('family_code')
    .order('family_code', { ascending: false })
    .limit(1);

  let nextNum = 1;
  if (data && data.length) {
    const last = data[0].family_code;
    nextNum = parseInt(last.replace('FAM',''), 10) + 1;
  }
  const family_code = 'FAM' + String(nextNum).padStart(3, '0');

  const { data: fam, error } = await sb
    .from('families')
    .insert({ family_code })
    .select()
    .single();

  if (error) { alert('Σφάλμα: ' + error.message); return; }

  await loadFamilies();
  toggleFam(fam.id);
  openMemberForm(fam.id, family_code, 'Parent1', null);
}

async function deleteFamily(famId) {
  if (!confirm('Διαγραφή οικογένειας και όλων των μελών της;')) return;
  await sb.from('members').delete().eq('family_id', famId);
  await sb.from('families').delete().eq('id', famId);
  loadFamilies();
}

let curFamId   = null;
let curFamCode = null;
let curRole    = null;
let curMemId   = null;
let formState  = {};

async function openMemberFormForEdit(memberId) {
  const { data: m } = await sb.from('members').select('*').eq('id', memberId).single();
  if (!m) return;
  const fam = allFamilies.find(f => f.id === m.family_id);
  curFamId   = m.family_id;
  curFamCode = fam?.family_code || '';
  curRole    = m.role;
  curMemId   = memberId;
  formState  = { ...(m.data || {}) };

  const code = curFamCode + '_' + m.role;
  document.getElementById('form-code-lbl').textContent = code;
  document.getElementById('form-role-lbl').textContent = roleLabel(m.role);

  const isParent = m.role.startsWith('Parent');
  document.getElementById('form-body').innerHTML = isParent
    ? buildParentForm(code)
    : buildChildForm(code);

  setTimeout(function() { restoreForm(formState); }, 60);
  document.getElementById('save-msg').style.display = 'none';
  showView('form');
  window.scrollTo(0, 0);
}

async function openMemberForm(famId, famCode, role, memberId) {
  if (memberId) { await openMemberFormForEdit(memberId); return; }
  
  const saved = formPersistence.load();
  if (saved && saved.curFamCode === famCode && saved.curRole === role) {
    curFamId   = saved.curFamId;
    curFamCode = saved.curFamCode;
    curRole    = saved.curRole;
    curMemId   = saved.curMemId;
    formState  = saved.formState || {};
  } else {
    curFamId   = famId;
    curFamCode = famCode;
    curRole    = role;
    curMemId   = null;
    formState  = {};
  }

  const code = famCode + '_' + role;
  document.getElementById('form-code-lbl').textContent = code;
  document.getElementById('form-role-lbl').textContent = roleLabel(role);

  document.getElementById('form-body').innerHTML = role.startsWith('Parent')
    ? buildParentForm(code)
    : buildChildForm(code);

  setTimeout(function() { restoreForm(formState); }, 60);
  document.getElementById('save-msg').style.display = 'none';
  showView('form');
  window.scrollTo(0, 0);
}

function goBackToFamilies() {
  formPersistence.clear();
  loadFamilies();
}

async function saveMember() {
  const amkaFields = document.querySelectorAll('[id$="_AMKA"]');
  let valid = true;
  amkaFields.forEach(function(f) { if (!validateAMKA(f.id)) valid = false; });
  if (!valid) return;

  const required = [
    { suffix: '_Examination_Date',  label: 'Ημερομηνία' },
    { suffix: '_Full_Name',         label: 'Ονοματεπώνυμο' },
    { suffix: '_AMKA',              label: 'ΑΜΚΑ' },
    { suffix: '_Date_of_Birth',     label: 'Ημερομηνία Γέννησης' },
    { suffix: '_Sex',               label: 'Φύλο' },
  ];
  
  const missing = [];
  required.forEach(function(r) {
    const el = document.getElementById(curFamCode + '_' + curRole + r.suffix);
    if (el && !el.value) missing.push(r.label);
  });
  
  if (missing.length) {
    const msg = document.getElementById('save-msg');
    msg.style.display = 'block';
    msg.className = 'save-msg err';
    msg.textContent = 'Προσοχή: Λείπουν υποχρεωτικά πεδία: ' + missing.join(', ');
    if (!confirm('Λείπουν υποχρεωτικά πεδία: ' + missing.join(', ') + '.\nΘέλετε να συνεχίσετε χωρίς αυτά;')) return;
  }

  const btn = document.getElementById('save-btn');
  const msg = document.getElementById('save-msg');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Αποθήκευση...';

  let error;
  if (curMemId) {
    ({ error } = await sb.from('members')
      .update({ data: formState, updated_at: new Date().toISOString() })
      .eq('id', curMemId));
  } else {
    ({ error } = await sb.from('members')
      .insert({ family_id: curFamId, role: curRole, data: formState }));
  }

  btn.disabled = false;
  btn.textContent = 'Αποθήκευση';
  msg.style.display = 'block';

  if (error) {
    msg.className = 'save-msg err';
    msg.textContent = 'Σφάλμα: ' + error.message;
  } else {
    msg.className = 'save-msg ok';
    msg.textContent = 'Αποθηκεύτηκε επιτυχώς.';
    formPersistence.clear();
    setTimeout(function() { loadFamilies(); }, 900);
  }
}

//  FORM FIELD HELPERS

function $(id) { return document.getElementById(id); }

function inp(id, label, type, ph) {
  type = type || 'text';
  ph = ph || '';
  return '<div class="fld"><span class="lbl">' + label + '</span>' +
    '<input type="' + type + '" id="' + id + '" placeholder="' + ph + '" oninput="formState[\'' + id + '\']=this.value; triggerAutoSave()">' +
    '<span class="field-err" id="' + id + '_err"></span></div>';
}

function amka(id, label) {
  return '<div class="fld"><span class="lbl">' + label + '</span>' +
    '<input type="text" id="' + id + '" placeholder="11 ψηφία" maxlength="11" ' +
    'oninput="formState[\'' + id + '\']=this.value; validateAMKA(\'' + id + '\'); triggerAutoSave()" ' +
    'onblur="validateAMKA(\'' + id + '\')">' +
    '<span class="field-err" id="' + id + '_err"></span></div>';
}

function validateAMKA(id) {
  var el = document.getElementById(id);
  var val = (el ? el.value : '').replace(/\D/g,'');
  var err = document.getElementById(id + '_err');
  if (!err) return true;
  if (!val) { err.textContent = ''; return true; }
  if (val.length !== 11) {
    err.textContent = 'Το ΑΜΚΑ πρέπει να έχει ακριβώς 11 ψηφία (έχει ' + val.length + ')';
    return false;
  }
  err.textContent = '';
  return true;
}

function sel(id, label, opts) {
  var options = opts.map(function(o) { return '<option>' + o + '</option>'; }).join('');
  return '<div class="fld"><span class="lbl">' + label + '</span>' +
    '<select id="' + id + '" onchange="formState[\'' + id + '\']=this.value; triggerAutoSave()">' +
    '<option value="">—</option>' + options + '</select></div>';
}

function yn(id, label) {
  return '<div class="fld"><span class="lbl">' + label + '</span>' +
    '<div class="yn">' +
    '<button class="yn-b" data-yn="' + id + '" data-val="1" onclick="setYN(\'' + id + '\',\'1\')">ΝΑΙ</button>' +
    '<button class="yn-b" data-yn="' + id + '" data-val="0" onclick="setYN(\'' + id + '\',\'0\')">ΟΧΙ</button>' +
    '</div></div>';
}

function setYN(id, val) {
  var buttons = document.querySelectorAll('[data-yn="' + id + '"]');
  var currentVal = formState[id];
  
  if (currentVal === val) {
    buttons.forEach(function(b) { b.classList.remove('y','n'); });
    formState[id] = null;
  } else {
    buttons.forEach(function(b) {
      b.classList.remove('y','n');
      if (b.dataset.val == val) b.classList.add(val === '1' ? 'y' : 'n');
    });
    formState[id] = val;
  }
  triggerAutoSave();
}

function nyha(pfx) {
  var btns = ['I','II','III','IV'].map(function(n, i) {
    return '<button class="nyha-b" data-nyha="' + pfx + '" data-val="' + (i+1) + '" onclick="setNYHA(\'' + pfx + '\',' + (i+1) + ')">' + n + '</button>';
  }).join('');
  return '<div class="fld"><span class="lbl">Στάδιο NYHA</span><div class="nyha-g">' + btns + '</div></div>';
}

function setNYHA(pfx, val) {
  document.querySelectorAll('[data-nyha="' + pfx + '"]').forEach(function(b) {
    b.classList.toggle('sel', parseInt(b.dataset.val) === val);
  });
  formState[pfx + '_NYHA_Class'] = val;
  triggerAutoSave();
}

function dutch(pfx) {
  var opts = ['DEFINITE FH','PROBABLE FH','POSSIBLE FH','UNLIKELY'].map(function(d) {
    return '<div class="dutch-o" data-dutch="' + pfx + '" data-val="' + d + '" onclick="setDutch(\'' + pfx + '\',\'' + d + '\')">' + d + '</div>';
  }).join('');
  return '<div style="font-size:10px;font-family:sans-serif;color:var(--muted);margin-bottom:6px;">' +
    'Αυτόματη κατηγοριοποίηση βάσει score · &gt;8: Definite · 6–8: Probable · 3–5: Possible · &lt;3: Unlikely</div>' +
    '<div class="dutch-opts">' + opts + '</div>';
}

function setDutch(pfx, val) {
  document.querySelectorAll('[data-dutch="' + pfx + '"]').forEach(function(b) {
    b.classList.toggle('sel', b.dataset.val === val);
  });
  formState[pfx + '_Dutch_Criteria_Result'] = val;
  triggerAutoSave();
}

function autoDutch(pfx, score) {
  var s = parseInt(score);
  var cat = '';
  if (isNaN(s)) cat = '';
  else if (s > 8) cat = 'DEFINITE FH';
  else if (s >= 6) cat = 'PROBABLE FH';
  else if (s >= 3) cat = 'POSSIBLE FH';
  else cat = 'UNLIKELY';
  if (cat) setDutch(pfx, cat);
}

function medGrid(pfx, list) {
  var items = list.map(function(m) {
    var key = pfx + '_' + m.replace(/[^a-zA-Z0-9]/g, '_');
    return '<div class="med-item" id="' + key + '" onclick="toggleMed(\'' + key + '\')"><div class="med-box"></div><span>' + m + '</span></div>';
  }).join('');
  return '<div class="meds-grid">' + items + '</div>';
}

function toggleMed(key) {
  var el = document.getElementById(key);
  if (el) {
    el.classList.toggle('on');
    formState[key] = el.classList.contains('on') ? 1 : 0;
    triggerAutoSave();
  }
}

function sec(label) { return '<div class="sec-lbl">' + label + '</div>'; }

function labGrid(pfx, labs) {
  var items = labs.map(function(l) { return numInp(pfx + '_' + l, l); }).join('');
  return '<div class="grid4">' + items + '</div>';
}

function numInp(id, label, ph) {
  ph = ph || '';
  return '<div class="fld"><span class="lbl">' + label + '</span>' +
    '<input type="text" id="' + id + '" placeholder="' + ph + '" ' +
    'oninput="onlyNumericInput(this); formState[\'' + id + '\']=this.value; triggerAutoSave()">' +
    '<span class="field-err" id="' + id + '_err"></span></div>';
}

function numInpBMI(id, label, ph, pfx) {
  return '<div class="fld"><span class="lbl">' + label + '</span>' +
    '<input type="text" id="' + id + '" placeholder="' + ph + '" ' +
    'oninput="onlyNumericInput(this); formState[\'' + id + '\']=this.value; calcBMI(\'' + pfx + '\'); triggerAutoSave()">' +
    '<span class="field-err" id="' + id + '_err"></span></div>';
}

function onlyNumericInput(el) {
  var before = el.value;
  el.value = el.value.replace(/[^0-9.]/g, '');
  var errEl = document.getElementById(el.id + '_err');
  if (errEl) errEl.textContent = (before !== el.value) ? 'Μόνο αριθμοί' : '';
}

function calcBMI(pfx) {
  var hEl = document.getElementById(pfx + '_Height_cm');
  var wEl = document.getElementById(pfx + '_Weight_kg');
  var h = parseFloat(hEl ? hEl.value : '');
  var w = parseFloat(wEl ? wEl.value : '');
  var bmiEl = document.getElementById(pfx + '_BMI_display');
  var bmiInp = document.getElementById(pfx + '_BMI');
  if (bmiEl) {
    if (h > 0 && w > 0) {
      var bmi = (w / Math.pow(h/100, 2)).toFixed(1);
      bmiEl.textContent = bmi;
      if (bmiInp) { bmiInp.value = bmi; formState[pfx + '_BMI'] = bmi; triggerAutoSave(); }
    } else {
      bmiEl.textContent = '—';
    }
  }
}

function bmiDisplay(pfx) {
  return '<div class="fld"><span class="lbl">BMI (αυτόματο)</span>' +
    '<div style="padding:7px 10px;border:1px solid var(--border2);border-radius:var(--r);font-size:12px;font-family:sans-serif;background:var(--bg);color:var(--text);">' +
    '<span id="' + pfx + '_BMI_display">—</span> kg/m²</div>' +
    '<input type="hidden" id="' + pfx + '_BMI"></div>';
}

function ynConditional(id, label, subHtml) {
  return '<div class="fld"><span class="lbl">' + label + '</span>' +
    '<div class="yn">' +
    '<button class="yn-b" data-yn="' + id + '" data-val="1" onclick="setYN(\'' + id + '\',\'1\'); document.getElementById(\'sub_' + id + '\').style.display=\'block\';">ΝΑΙ</button>' +
    '<button class="yn-b" data-yn="' + id + '" data-val="0" onclick="setYN(\'' + id + '\',\'0\'); document.getElementById(\'sub_' + id + '\').style.display=\'none\';">ΟΧΙ</button>' +
    '</div>' +
    '<div id="sub_' + id + '" style="display:none;margin-top:6px;padding:8px;border-left:3px solid var(--blue-mid);background:var(--blue-bg);border-radius:0 var(--r) var(--r) 0;">' +
    subHtml + '</div></div>';
}

function inpDutch(id, pfx) {
  return '<div class="fld"><span class="lbl">Total score (0–31)</span>' +
    '<input type="text" id="' + id + '" placeholder="0–31" ' +
    'oninput="onlyNumericInput(this); if(parseInt(this.value)>31){this.value=31;} formState[\'' + id + '\']=this.value; autoDutch(\'' + pfx + '\',this.value); triggerAutoSave()">' +
    '<span class="field-err" id="' + id + '_err"></span></div>';
}

function metsGrid(pfx) {
  var items = [
    {key:'MetS_TRG_150', label:'TRG > 150 ή υπολιπιδαιμικά'},
    {key:'MetS_HDL_low', label:'HDL < 40 (άνδρες) / < 50 (γυναίκες)'},
    {key:'MetS_Glu_100', label:'ΣΔ ή Glu > 100'},
    {key:'MetS_BP_130_85', label:'Υπέρταση ή ΑΠ > 130/85'},
    {key:'MetS_Waist', label:'Περίμετρος μέσης > 102/88 cm'}
  ];
  var html = items.map(function(m) {
    var key = pfx + '_' + m.key;
    return '<div class="med-item" id="' + key + '" onclick="toggleMetS(this, \'' + pfx + '\')"><div class="med-box"></div><span>' + m.label + '</span></div>';
  }).join('');
  return '<div class="meds-grid">' + html + '</div>';
}

function toggleMetS(el, pfx) {
  el.classList.toggle('on');
  formState[el.id] = el.classList.contains('on') ? 1 : 0;
  var count = 0;
  document.querySelectorAll('[id^="' + pfx + '_MetS_"]').forEach(function(e) {
    if (e.classList.contains('on')) count++;
  });
  setYN(pfx + '_Metabolic_Syndrome', count >= 3 ? '1' : '0');
  triggerAutoSave();
}

// ══════════════════════════════════════════════
//  RESTORE SAVED VALUES INTO FORM
// ══════════════════════════════════════════════
function restoreForm(d) {
  Object.keys(d).forEach(function(k) {
    var el = document.getElementById(k);
    if (!el) return;
    if (el.tagName === 'INPUT' || el.tagName === 'SELECT') el.value = d[k] || '';
    if (el.classList.contains('med-item') && d[k]) el.classList.add('on');
  });
  
  Object.keys(d).forEach(function(k) {
    if (d[k] === '1' || d[k] === '0') {
      document.querySelectorAll('[data-yn="' + k + '"]').forEach(function(b) {
        b.classList.remove('y','n');
        if (b.dataset.val == d[k]) b.classList.add(d[k] === '1' ? 'y' : 'n');
      });
    }
  });
  
  document.querySelectorAll('[data-nyha]').forEach(function(b) {
    var v = d[b.dataset.nyha + '_NYHA_Class'];
    if (v && parseInt(b.dataset.val) === parseInt(v)) b.classList.add('sel');
  });
  
  document.querySelectorAll('[data-dutch]').forEach(function(b) {
    var v = d[b.dataset.dutch + '_Dutch_Criteria_Result'];
    if (v && b.dataset.val === v) b.classList.add('sel');
  });
  
  document.querySelectorAll('[id$="_BMI_display"]').forEach(function(el) {
    var pfx = el.id.replace('_BMI_display', '');
    calcBMI(pfx);
  });
}

// ══════════════════════════════════════════════
//  XLSX EXPORT
// ══════════════════════════════════════════════
async function exportAllXLSX() {
  var result = await sb.from('families').select('*, members(*)').order('family_code', { ascending: true });
  if (result.error || !result.data || !result.data.length) { alert('Δεν βρέθηκαν δεδομένα.'); return; }
  triggerXLSXDownload(result.data, 'fh_edc_all_' + today() + '.xlsx');
}

async function exportFamilyXLSX(famId) {
  var result = await sb.from('families').select('*, members(*)').eq('id', famId).single();
  if (!result.data) return;
  triggerXLSXDownload([result.data], result.data.family_code + '_' + today() + '.xlsx');
}

function triggerXLSXDownload(families, filename) {
  var rows = [];
  families.forEach(function(fam) {
    var members = fam.members || [];
    members.forEach(function(m) {
      var row = { family_code: fam.family_code, role: m.role };
      Object.keys(m.data || {}).forEach(function(k) {
        var cleanKey = k.replace(/^[^_]+_[^_]+_/, '');
        row[cleanKey] = m.data[k];
      });
      rows.push(row);
    });
  });
  
  var ws = XLSX.utils.json_to_sheet(rows);
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Data');
  XLSX.writeFile(wb, filename);
}

async function exportAllCSV() {
  var result = await sb.from('families').select('*, members(*)').order('family_code', { ascending: true });
  if (result.error || !result.data || !result.data.length) { alert('Δεν βρέθηκαν δεδομένα.'); return; }
  triggerCSVDownload(result.data, 'fh_edc_all_' + today() + '.csv');
}

async function exportFamilyCSV(famId) {
  var result = await sb.from('families').select('*, members(*)').eq('id', famId).single();
  if (!result.data) return;
  triggerCSVDownload([result.data], result.data.family_code + '_' + today() + '.csv');
}

function triggerCSVDownload(families, filename) {
  var rows = [];
  var headers = ['family_code', 'role'];
  
  families.forEach(function(fam) {
    (fam.members || []).forEach(function(m) {
      var row = { family_code: fam.family_code, role: m.role };
      Object.keys(m.data || {}).forEach(function(k) {
        var cleanKey = k.replace(/^[^_]+_[^_]+_/, '');
        row[cleanKey] = m.data[k];
        if (headers.indexOf(cleanKey) === -1) headers.push(cleanKey);
      });
      rows.push(row);
    });
  });
  
  var csvContent = headers.join(',') + '\n';
  rows.forEach(function(row) {
    var line = headers.map(function(h) {
      var val = row[h] || '';
      return '"' + String(val).replace(/"/g, '""') + '"';
    }).join(',');
    csvContent += line + '\n';
  });
  
  var blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

function today() {
  return new Date().toISOString().slice(0, 10);
}
